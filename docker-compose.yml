services:
  incident-harness:
    build:
      context: .
    image: incident-diagnostic-harness:local
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./prompts:/app/prompts:ro
      - ./runs:/app/runs
    command: ["uvicorn", "api.main:app", "--app-dir", "src", "--host", "0.0.0.0", "--port", "8000"]
